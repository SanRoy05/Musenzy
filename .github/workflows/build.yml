name: 🎵 Build Musenzy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: ✅ Flutter version check
        run: flutter --version

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: ⚙️ Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔧 Configure Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties
          echo "android.enableR8.fullMode=false" >> android/gradle.properties

      - name: 🔨 Build All APKs (split + universal)
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons

      - name: 📊 Show APK sizes
        run: |
          echo "=== APK Files ==="
          ls -lh build/app/outputs/flutter-apk/*.apk

      - name: 📤 Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: Musenzy-arm64-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📤 Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: Musenzy-armeabi-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📤 Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Musenzy-universal-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
